<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EverythingLearn — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#0f0c29; --bg2:#302b63; --bg3:#24243e;
  --accent:#7c5cff; --accent2:#00d4ff; --accent3:#ff5c8a;
  --green:#2ecc71; --red:#ff5c5c;
  --card:rgba(255,255,255,0.06); --card-border:rgba(255,255,255,0.12);
  --text:#f4f4fb; --text-dim:#a9a6c8; --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;color:var(--text);background:linear-gradient(-45deg,var(--bg1),var(--bg2),var(--bg3),#1b1836);background-size:400% 400%;animation:gradientShift 20s ease infinite;min-height:100vh;}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
h1,h2,h3{font-family:'Poppins',sans-serif;}
.hidden{display:none !important;}
.btn{cursor:pointer;border:none;border-radius:10px;font-weight:600;font-family:'Inter',sans-serif;transition:transform .15s ease;}
.btn:active{transform:scale(.96);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:10px 18px;}
.btn-ghost{background:var(--card);border:1px solid var(--card-border);color:var(--text);padding:10px 16px;}
.btn-danger{background:rgba(255,92,92,0.18);border:1px solid var(--red);color:#ffb3b3;padding:8px 14px;font-size:0.82rem;}
.btn-sm{padding:7px 12px;font-size:0.82rem;}

/* Auth */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.auth-card{background:var(--card);border:1px solid var(--card-border);backdrop-filter:blur(16px);border-radius:var(--radius);padding:36px;width:100%;max-width:380px;}
.auth-card h1{font-size:1.5rem;margin-bottom:6px;text-align:center;}
.auth-sub{color:var(--text-dim);text-align:center;margin-bottom:22px;font-size:0.9rem;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:0.82rem;color:var(--text-dim);margin-bottom:5px;}
.field input,.field textarea,.field select{width:100%;padding:11px 13px;border-radius:9px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.92rem;outline:none;font-family:'Inter',sans-serif;}
.field textarea{resize:vertical;min-height:70px;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent2);}
.auth-error{color:var(--red);font-size:0.82rem;margin-bottom:8px;min-height:16px;}
.auth-card .btn-primary{width:100%;padding:12px;margin-top:4px;}

/* Layout */
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:rgba(15,12,41,0.4);border-bottom:1px solid var(--card-border);position:sticky;top:0;z-index:10;backdrop-filter:blur(10px);}
.logo{font-weight:800;font-size:1.15rem;display:flex;gap:8px;align-items:center;}
main{max-width:1100px;margin:0 auto;padding:28px 24px 80px;display:grid;grid-template-columns:320px 1fr;gap:24px;}
@media(max-width:860px){ main{grid-template-columns:1fr;} }

.panel{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px;}
.panel h2{font-size:1.05rem;margin-bottom:14px;}
.course-list-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 12px;border-radius:10px;cursor:pointer;margin-bottom:6px;transition:background .15s;}
.course-list-item:hover{background:rgba(255,255,255,0.08);}
.course-list-item.active{background:rgba(124,92,255,0.2);border:1px solid var(--accent);}
.cli-left{display:flex;align-items:center;gap:10px;overflow:hidden;}
.cli-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.cli-left span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:0.9rem;}

.divider{height:1px;background:var(--card-border);margin:18px 0;}

.workspace-empty{text-align:center;padding:60px 20px;color:var(--text-dim);}
.course-detail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap;}
.course-detail-head h2{font-size:1.3rem;}
.lesson-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.04);border:1px solid var(--card-border);border-radius:12px;padding:13px 16px;margin-bottom:10px;}
.lesson-row .lr-left{display:flex;flex-direction:column;gap:2px;}
.lesson-row .lr-left b{font-size:0.95rem;}
.lesson-row .lr-left span{font-size:0.78rem;color:var(--text-dim);}
.lr-actions{display:flex;gap:8px;}

/* Step builder */
.step-item{background:rgba(255,255,255,0.04);border:1px solid var(--card-border);border-radius:12px;padding:14px 16px;margin-bottom:10px;position:relative;}
.step-item .step-type-badge{display:inline-block;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;background:rgba(124,92,255,0.25);color:#c9bfff;padding:3px 9px;border-radius:6px;margin-bottom:8px;}
.step-item .remove-step{position:absolute;top:12px;right:12px;cursor:pointer;color:var(--text-dim);font-size:0.9rem;}
.step-item .remove-step:hover{color:var(--red);}
.opt-row{display:flex;gap:8px;margin-bottom:6px;align-items:center;}
.opt-row input[type="text"]{flex:1;}
.opt-row input[type="radio"]{width:18px;height:18px;flex-shrink:0;}
.add-opt-btn{font-size:0.8rem;color:var(--accent2);cursor:pointer;margin-top:4px;display:inline-block;}

.step-type-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.step-type-picker button{flex:1;min-width:110px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal-box{background:#1b1836;border:1px solid var(--card-border);border-radius:var(--radius);padding:26px;max-width:460px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-box h3{margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card);border:1px solid var(--card-border);backdrop-filter:blur(10px);padding:12px 22px;border-radius:12px;z-index:300;transition:transform .3s ease;font-size:0.88rem;}
.toast.show{transform:translateX(-50%) translateY(0);}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.swatch{width:30px;height:30px;border-radius:8px;cursor:pointer;border:2px solid transparent;}
.swatch.selected{border-color:#fff;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-card">
    <h1>🛠 EverythingLearn Admin</h1>
    <p class="auth-sub">Sign in with your admin account to manage content.</p>
    <div class="auth-error" id="authError"></div>
    <div class="field"><label>Email</label><input type="email" id="authEmail" placeholder="admin@example.com"></div>
    <div class="field"><label>Password</label><input type="password" id="authPassword" placeholder="••••••••"></div>
    <button class="btn btn-primary" id="authSubmit">Log In</button>
    <p style="text-align:center;color:var(--text-dim);font-size:0.78rem;margin-top:14px;">Need an account? Create one in the learner app first, then use those credentials here.</p>
  </div>
</div>

<!-- APP -->
<div id="mainApp" class="hidden">
  <nav>
    <div class="logo">🛠 EverythingLearn <span style="color:var(--text-dim);font-weight:400;">/ admin</span></div>
    <button class="btn btn-ghost" id="logoutBtn">Log out</button>
  </nav>

  <main>
    <div class="panel">
      <h2>Courses</h2>
      <div id="courseList"></div>
      <div class="divider"></div>
      <button class="btn btn-primary" style="width:100%;" id="newCourseBtn">+ New Course</button>
      <button class="btn btn-ghost" style="width:100%;margin-top:8px;" id="importCourseBtn">⬆ Import course (JSON)</button>
      <button class="btn btn-ghost" style="width:100%;margin-top:8px;" id="downloadTemplateBtn">⬇ Download template</button>
      <input type="file" id="importFileInput" accept="application/json" class="hidden">
    </div>

    <div class="panel" id="workspace">
      <div class="workspace-empty">Select a course on the left, or create a new one to get started.</div>
    </div>
  </main>
</div>

<!-- New/Edit Course Modal -->
<div class="modal-overlay hidden" id="courseModal">
  <div class="modal-box">
    <h3 id="courseModalTitle">New Course</h3>
    <div class="field"><label>Title</label><input type="text" id="cTitle" placeholder="Intro to Python"></div>
    <div class="field"><label>Description</label><textarea id="cDesc" placeholder="Learn the basics of Python programming."></textarea></div>
    <div class="field"><label>Icon (emoji)</label><input type="text" id="cIcon" placeholder="🐍" maxlength="4"></div>
    <div class="field">
      <label>Color</label>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>
    <div class="field"><label>Order (lower = shows first)</label><input type="number" id="cOrder" value="0"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="courseModalCancel">Cancel</button>
      <button class="btn btn-primary" id="courseModalSave">Save Course</button>
    </div>
  </div>
</div>

<!-- New/Edit Lesson Modal -->
<div class="modal-overlay hidden" id="lessonModal">
  <div class="modal-box" style="max-width:640px;">
    <h3 id="lessonModalTitle">New Lesson</h3>
    <div class="field"><label>Lesson title</label><input type="text" id="lTitle" placeholder="Variables & Data Types"></div>
    <div class="field"><label>Order</label><input type="number" id="lOrder" value="0"></div>
    <div class="divider"></div>
    <h3 style="font-size:0.95rem;margin-bottom:10px;">Steps</h3>
    <div id="stepsContainer"></div>
    <div class="step-type-picker">
      <button class="btn btn-ghost btn-sm" data-type="content">+ Content</button>
      <button class="btn btn-ghost btn-sm" data-type="mcq">+ Multiple choice</button>
      <button class="btn btn-ghost btn-sm" data-type="fillblank">+ Fill blank</button>
      <button class="btn btn-ghost btn-sm" data-type="code">+ Code exercise</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="lessonModalCancel">Cancel</button>
      <button class="btn btn-primary" id="lessonModalSave">Save Lesson</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDbIaPMZ4qnot5TOY96ZrJDP9eJvGj-q3w",
  authDomain: "everythinglearn-36662.firebaseapp.com",
  projectId: "everythinglearn-36662",
  storageBucket: "everythinglearn-36662.firebasestorage.app",
  messagingSenderId: "215856526803",
  appId: "1:215856526803:web:b25023c12df9e2d0f8ab26",
  measurementId: "G-W63KTTMSX1"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_EMAIL = 'siuozl@hotmail.com';

function $(id){ return document.getElementById(id); }
function showToast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function escapeHtml(str){ const d=document.createElement('div'); d.textContent=str||''; return d.innerHTML; }

const COLORS = [
  'linear-gradient(135deg,#7c5cff,#00d4ff)',
  'linear-gradient(135deg,#ff5c8a,#ff9a5c)',
  'linear-gradient(135deg,#2ecc71,#00d4ff)',
  'linear-gradient(135deg,#ffcf4d,#ff5c8a)',
  'linear-gradient(135deg,#a855f7,#6366f1)',
  'linear-gradient(135deg,#00d4ff,#2ecc71)'
];
let selectedColor = COLORS[0];

/* ---------------- AUTH ---------------- */
$('authSubmit').addEventListener('click', async ()=>{
  const email = $('authEmail').value.trim();
  const pass = $('authPassword').value;
  $('authError').textContent='';
  if(!email||!pass){ $('authError').textContent='Enter email and password.'; return; }
  try{
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    if(cred.user.email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()){
      await auth.signOut();
      $('authError').textContent = 'This account is not authorized for admin access.';
    }
  }catch(err){
    $('authError').textContent = err.message;
  }
});
$('logoutBtn').addEventListener('click', ()=> auth.signOut());

auth.onAuthStateChanged(user=>{
  if(user && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()){
    $('authScreen').classList.add('hidden');
    $('mainApp').classList.remove('hidden');
    loadCourses();
  } else {
    $('mainApp').classList.add('hidden');
    $('authScreen').classList.remove('hidden');
    if(user){
      // logged in but not the admin account
      auth.signOut();
      $('authError').textContent = 'This account is not authorized for admin access.';
    }
  }
});

/* ---------------- COURSES ---------------- */
let courses = [];
let activeCourseId = null;
let activeLessons = [];

async function loadCourses(){
  const snap = await db.collection('courses').orderBy('order','asc').get().catch(()=>db.collection('courses').get());
  courses = snap.docs.map(d=>({id:d.id, ...d.data()}));
  renderCourseList();
}

function renderCourseList(){
  const list = $('courseList');
  if(courses.length===0){ list.innerHTML = `<p style="color:var(--text-dim);font-size:0.85rem;">No courses yet.</p>`; return; }
  list.innerHTML='';
  courses.forEach(c=>{
    const el = document.createElement('div');
    el.className = 'course-list-item' + (c.id===activeCourseId?' active':'');
    el.innerHTML = `<div class="cli-left"><div class="cli-icon" style="background:${c.color||COLORS[0]}">${c.icon||'📘'}</div><span>${escapeHtml(c.title)}</span></div>`;
    el.addEventListener('click', ()=> selectCourse(c.id));
    list.appendChild(el);
  });
}

async function selectCourse(id){
  activeCourseId = id;
  renderCourseList();
  const course = courses.find(c=>c.id===id);
  const snap = await db.collection('courses').doc(id).collection('lessons').orderBy('order','asc').get();
  activeLessons = snap.docs.map(d=>({id:d.id, ...d.data()}));
  renderWorkspace(course);
}

function renderWorkspace(course){
  const ws = $('workspace');
  ws.innerHTML = `
    <div class="course-detail-head">
      <h2>${course.icon||'📘'} ${escapeHtml(course.title)}</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" id="exportCourseBtn">⬇ Export JSON</button>
        <button class="btn btn-ghost btn-sm" id="editCourseBtn">Edit course</button>
        <button class="btn btn-danger btn-sm" id="deleteCourseBtn">Delete course</button>
      </div>
    </div>
    <p style="color:var(--text-dim);font-size:0.9rem;margin-bottom:18px;">${escapeHtml(course.description||'')}</p>
    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h3 style="font-size:1rem;">Lessons (${activeLessons.length})</h3>
      <button class="btn btn-primary btn-sm" id="addLessonBtn">+ Add lesson</button>
    </div>
    <div id="lessonsList"></div>
  `;
  const ll = $('lessonsList');
  if(activeLessons.length===0){
    ll.innerHTML = `<p style="color:var(--text-dim);font-size:0.85rem;">No lessons yet. Add one above.</p>`;
  } else {
    activeLessons.forEach(lesson=>{
      const row = document.createElement('div');
      row.className='lesson-row';
      row.innerHTML = `
        <div class="lr-left"><b>${escapeHtml(lesson.title)}</b><span>${(lesson.steps||[]).length} steps · order ${lesson.order}</span></div>
        <div class="lr-actions">
          <button class="btn btn-ghost btn-sm" data-edit="${lesson.id}">Edit</button>
          <button class="btn btn-danger btn-sm" data-del="${lesson.id}">Delete</button>
        </div>`;
      ll.appendChild(row);
    });
    ll.querySelectorAll('[data-edit]').forEach(b=> b.addEventListener('click', ()=> openLessonModal(b.dataset.edit)));
    ll.querySelectorAll('[data-del]').forEach(b=> b.addEventListener('click', ()=> deleteLesson(b.dataset.del)));
  }
  $('editCourseBtn').addEventListener('click', ()=> openCourseModal(course));
  $('deleteCourseBtn').addEventListener('click', ()=> deleteCourse(course));
  $('addLessonBtn').addEventListener('click', ()=> openLessonModal(null));
  $('exportCourseBtn').addEventListener('click', ()=>{
    const exportData = {
      title: course.title, description: course.description||'', icon: course.icon||'📘',
      color: course.color||COLORS[0], order: course.order||0,
      lessons: activeLessons.map(l=>({ title: l.title, order: l.order, steps: l.steps||[] }))
    };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${course.title.replace(/\s+/g,'-').toLowerCase()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });
}

/* ---------------- COURSE MODAL ---------------- */
function buildColorSwatches(){
  const wrap = $('colorSwatches');
  wrap.innerHTML='';
  COLORS.forEach(c=>{
    const sw = document.createElement('div');
    sw.className='swatch'+(c===selectedColor?' selected':'');
    sw.style.background=c;
    sw.addEventListener('click', ()=>{ selectedColor=c; buildColorSwatches(); });
    wrap.appendChild(sw);
  });
}

let editingCourseId = null;
function openCourseModal(course){
  editingCourseId = course ? course.id : null;
  $('courseModalTitle').textContent = course ? 'Edit Course' : 'New Course';
  $('cTitle').value = course ? course.title : '';
  $('cDesc').value = course ? course.description||'' : '';
  $('cIcon').value = course ? course.icon||'' : '';
  $('cOrder').value = course ? (course.order||0) : (courses.length);
  selectedColor = course ? (course.color||COLORS[0]) : COLORS[0];
  buildColorSwatches();
  $('courseModal').classList.remove('hidden');
}
$('newCourseBtn').addEventListener('click', ()=> openCourseModal(null));
$('courseModalCancel').addEventListener('click', ()=> $('courseModal').classList.add('hidden'));
$('courseModalSave').addEventListener('click', async ()=>{
  const title = $('cTitle').value.trim();
  if(!title){ showToast('Title is required'); return; }
  const data = {
    title, description: $('cDesc').value.trim(), icon: $('cIcon').value.trim()||'📘',
    color: selectedColor, order: Number($('cOrder').value)||0
  };
  const saveBtn = $('courseModalSave');
  saveBtn.textContent = 'Saving...'; saveBtn.disabled = true;
  try{
    if(editingCourseId){
      await db.collection('courses').doc(editingCourseId).update(data);
      showToast('Course updated');
    } else {
      const ref = await db.collection('courses').add({...data, lessonCount:0, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
      showToast('Course created');
      activeCourseId = ref.id;
    }
    $('courseModal').classList.add('hidden');
    await loadCourses();
    if(activeCourseId) selectCourse(activeCourseId);
  }catch(err){
    console.error(err);
    alert('Save failed: ' + err.message + '\n\nThis usually means your Firestore security rules are blocking the write. Check the rules section in the setup notes.');
  }
  saveBtn.textContent = 'Save Course'; saveBtn.disabled = false;
});

async function deleteCourse(course){
  if(!confirm(`Delete "${course.title}" and all its lessons? This cannot be undone.`)) return;
  const lessonsSnap = await db.collection('courses').doc(course.id).collection('lessons').get();
  const batch = db.batch();
  lessonsSnap.forEach(d=> batch.delete(d.ref));
  batch.delete(db.collection('courses').doc(course.id));
  await batch.commit();
  showToast('Course deleted');
  activeCourseId = null;
  $('workspace').innerHTML = `<div class="workspace-empty">Select a course on the left, or create a new one to get started.</div>`;
  loadCourses();
}

/* ---------------- LESSON MODAL / STEP BUILDER ---------------- */
let editingLessonId = null;
let stepsDraft = [];

function openLessonModal(lessonId){
  editingLessonId = lessonId;
  const lesson = lessonId ? activeLessons.find(l=>l.id===lessonId) : null;
  $('lessonModalTitle').textContent = lesson ? 'Edit Lesson' : 'New Lesson';
  $('lTitle').value = lesson ? lesson.title : '';
  $('lOrder').value = lesson ? lesson.order : activeLessons.length;
  stepsDraft = lesson ? JSON.parse(JSON.stringify(lesson.steps||[])) : [];
  renderStepsDraft();
  $('lessonModal').classList.remove('hidden');
}
$('lessonModalCancel').addEventListener('click', ()=> $('lessonModal').classList.add('hidden'));

document.querySelectorAll('.step-type-picker button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const type = btn.dataset.type;
    if(type==='content') stepsDraft.push({type:'content', title:'', body:'', emoji:''});
    if(type==='mcq') stepsDraft.push({type:'mcq', question:'', options:['',''], correctIndex:0, explanation:''});
    if(type==='fillblank') stepsDraft.push({type:'fillblank', question:'', answers:[''], explanation:''});
    if(type==='code') stepsDraft.push({type:'code', prompt:'', starterCode:'// write your code here\n', expectedOutput:''});
    renderStepsDraft();
  });
});

function renderStepsDraft(){
  const wrap = $('stepsContainer');
  wrap.innerHTML='';
  stepsDraft.forEach((step, idx)=>{
    const el = document.createElement('div');
    el.className='step-item';
    let inner = `<span class="step-type-badge">${step.type}</span>
      <div class="remove-step" data-remove="${idx}">✕ remove</div>
      <div style="position:absolute;top:12px;right:80px;display:flex;gap:6px;">
        <span style="cursor:pointer;color:var(--text-dim);${idx===0?'opacity:0.3;pointer-events:none;':''}" data-moveup="${idx}">↑</span>
        <span style="cursor:pointer;color:var(--text-dim);${idx===stepsDraft.length-1?'opacity:0.3;pointer-events:none;':''}" data-movedown="${idx}">↓</span>
      </div>`;
    if(step.type==='content'){
      inner += `
        <div class="field"><label>Emoji (optional)</label><input type="text" maxlength="4" data-field="emoji" data-idx="${idx}" value="${escapeHtml(step.emoji)}"></div>
        <div class="field"><label>Title</label><input type="text" data-field="title" data-idx="${idx}" value="${escapeHtml(step.title)}"></div>
        <div class="field"><label>Body text</label><textarea data-field="body" data-idx="${idx}">${escapeHtml(step.body)}</textarea></div>
      `;
    } else if(step.type==='mcq'){
      inner += `<div class="field"><label>Question</label><input type="text" data-field="question" data-idx="${idx}" value="${escapeHtml(step.question)}"></div>
        <label style="font-size:0.82rem;color:var(--text-dim);">Options (select the correct one)</label>`;
      step.options.forEach((opt,oi)=>{
        inner += `<div class="opt-row">
          <input type="radio" name="mcqcorrect_${idx}" ${step.correctIndex===oi?'checked':''} data-mcqcorrect="${idx}" data-oi="${oi}">
          <input type="text" placeholder="Option ${oi+1}" value="${escapeHtml(opt)}" data-mcqopt="${idx}" data-oi="${oi}">
          <span style="cursor:pointer;color:var(--red);font-size:0.8rem;" data-mcqremopt="${idx}" data-oi="${oi}">✕</span>
        </div>`;
      });
      inner += `<div class="add-opt-btn" data-addopt="${idx}">+ Add option</div>
        <div class="field" style="margin-top:8px;"><label>Explanation (optional)</label><input type="text" data-field="explanation" data-idx="${idx}" value="${escapeHtml(step.explanation)}"></div>`;
    } else if(step.type==='fillblank'){
      inner += `<div class="field"><label>Question / prompt</label><input type="text" data-field="question" data-idx="${idx}" value="${escapeHtml(step.question)}"></div>
        <div class="field"><label>Accepted answers (comma-separated)</label><input type="text" data-field="answersCsv" data-idx="${idx}" value="${escapeHtml((step.answers||[]).join(', '))}"></div>
        <div class="field"><label>Explanation (optional)</label><input type="text" data-field="explanation" data-idx="${idx}" value="${escapeHtml(step.explanation)}"></div>`;
    } else if(step.type==='code'){
      inner += `<div class="field"><label>Prompt</label><input type="text" data-field="prompt" data-idx="${idx}" value="${escapeHtml(step.prompt)}"></div>
        <div class="field"><label>Starter code (JS)</label><textarea data-field="starterCode" style="font-family:monospace;">${escapeHtml(step.starterCode)}</textarea></div>
        <div class="field"><label>Expected console.log output (exact match; leave blank to always pass)</label><input type="text" data-field="expectedOutput" data-idx="${idx}" value="${escapeHtml(step.expectedOutput)}"></div>`;
    }
    el.innerHTML = inner;
    wrap.appendChild(el);
  });

  wrap.querySelectorAll('[data-remove]').forEach(b=> b.addEventListener('click', ()=>{ stepsDraft.splice(Number(b.dataset.remove),1); renderStepsDraft(); }));
  wrap.querySelectorAll('[data-moveup]').forEach(b=> b.addEventListener('click', ()=>{
    const i = Number(b.dataset.moveup); if(i>0){ [stepsDraft[i-1],stepsDraft[i]]=[stepsDraft[i],stepsDraft[i-1]]; renderStepsDraft(); }
  }));
  wrap.querySelectorAll('[data-movedown]').forEach(b=> b.addEventListener('click', ()=>{
    const i = Number(b.dataset.movedown); if(i<stepsDraft.length-1){ [stepsDraft[i+1],stepsDraft[i]]=[stepsDraft[i],stepsDraft[i+1]]; renderStepsDraft(); }
  }));
  wrap.querySelectorAll('[data-field]').forEach(inp=> inp.addEventListener('input', ()=>{
    const idx = Number(inp.dataset.idx); const field = inp.dataset.field;
    if(field==='answersCsv'){ stepsDraft[idx].answers = inp.value.split(',').map(s=>s.trim()).filter(Boolean); }
    else stepsDraft[idx][field] = inp.value;
  }));
  wrap.querySelectorAll('[data-mcqopt]').forEach(inp=> inp.addEventListener('input', ()=>{
    stepsDraft[Number(inp.dataset.mcqopt)].options[Number(inp.dataset.oi)] = inp.value;
  }));
  wrap.querySelectorAll('[data-mcqcorrect]').forEach(inp=> inp.addEventListener('change', ()=>{
    stepsDraft[Number(inp.dataset.mcqcorrect)].correctIndex = Number(inp.dataset.oi);
  }));
  wrap.querySelectorAll('[data-mcqremopt]').forEach(b=> b.addEventListener('click', ()=>{
    const idx = Number(b.dataset.mcqremopt); stepsDraft[idx].options.splice(Number(b.dataset.oi),1); renderStepsDraft();
  }));
  wrap.querySelectorAll('[data-addopt]').forEach(b=> b.addEventListener('click', ()=>{
    stepsDraft[Number(b.dataset.addopt)].options.push(''); renderStepsDraft();
  }));
}

$('lessonModalSave').addEventListener('click', async ()=>{
  const title = $('lTitle').value.trim();
  if(!title){ showToast('Lesson title required'); return; }
  const data = { title, order: Number($('lOrder').value)||0, steps: stepsDraft, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  const courseRef = db.collection('courses').doc(activeCourseId);
  const saveBtn = $('lessonModalSave');
  saveBtn.textContent = 'Saving...'; saveBtn.disabled = true;
  try{
    if(editingLessonId){
      await courseRef.collection('lessons').doc(editingLessonId).update(data);
      showToast('Lesson updated');
    } else {
      await courseRef.collection('lessons').add({...data, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
      showToast('Lesson created');
    }
    const lessonsSnap = await courseRef.collection('lessons').get();
    await courseRef.update({lessonCount: lessonsSnap.size});
    $('lessonModal').classList.add('hidden');
    await loadCourses();
    selectCourse(activeCourseId);
  }catch(err){
    console.error(err);
    alert('Save failed: ' + err.message + '\n\nThis usually means your Firestore security rules are blocking the write. Check the rules section in the setup notes.');
  }
  saveBtn.textContent = 'Save Lesson'; saveBtn.disabled = false;
});

async function deleteLesson(lessonId){
  if(!confirm('Delete this lesson?')) return;
  try{
    const courseRef = db.collection('courses').doc(activeCourseId);
    await courseRef.collection('lessons').doc(lessonId).delete();
    const lessonsSnap = await courseRef.collection('lessons').get();
    await courseRef.update({lessonCount: lessonsSnap.size});
    showToast('Lesson deleted');
    await loadCourses();
    selectCourse(activeCourseId);
  }catch(err){
    alert('Delete failed: ' + err.message);
  }
}

$('importCourseBtn').addEventListener('click', ()=> $('importFileInput').click());

$('importFileInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  e.target.value = '';
  let data;
  try{
    const text = await file.text();
    data = JSON.parse(text);
  }catch(err){
    alert('That file is not valid JSON: ' + err.message);
    return;
  }
  if(!data.title || !Array.isArray(data.lessons)){
    alert('Invalid course file. It needs at least a "title" and a "lessons" array. Download the template to see the expected format.');
    return;
  }
  if(!confirm(`Import "${data.title}" with ${data.lessons.length} lesson(s)? This creates a brand new course.`)) return;

  showToast('Importing course...');
  try{
    const courseData = {
      title: data.title,
      description: data.description || '',
      icon: data.icon || '📘',
      color: data.color || COLORS[0],
      order: Number(data.order) || courses.length,
      lessonCount: data.lessons.length,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    const courseRef = await db.collection('courses').add(courseData);

    // Batch-write lessons. Firestore batches cap at 500 ops; fine for course-scale imports.
    const batch = db.batch();
    data.lessons.forEach((lesson, i)=>{
      const lessonRef = courseRef.collection('lessons').doc();
      batch.set(lessonRef, {
        title: lesson.title || `Lesson ${i+1}`,
        order: Number(lesson.order) != null ? Number(lesson.order) : i,
        steps: Array.isArray(lesson.steps) ? lesson.steps : [],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    await batch.commit();

    showToast(`Imported "${data.title}" with ${data.lessons.length} lessons! 🎉`);
    activeCourseId = courseRef.id;
    await loadCourses();
    selectCourse(activeCourseId);
  }catch(err){
    console.error(err);
    alert('Import failed: ' + err.message + '\n\nThis is usually a Firestore security rules issue.');
  }
});
