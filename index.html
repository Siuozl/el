<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EverythingLearn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#0f0c29; --bg2:#302b63; --bg3:#24243e;
  --accent:#7c5cff; --accent2:#00d4ff; --accent3:#ff5c8a;
  --green:#2ecc71; --yellow:#ffcf4d; --red:#ff5c5c;
  --card:rgba(255,255,255,0.06); --card-border:rgba(255,255,255,0.12);
  --text:#f4f4fb; --text-dim:#a9a6c8;
  --radius:20px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html.locked,body.locked{overflow:hidden;height:100%;}
.ic{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.ic svg{width:100%;height:100%;display:block;}
body{
  font-family:'Inter',sans-serif; color:var(--text);
  background:linear-gradient(-45deg,var(--bg1),var(--bg2),var(--bg3),#1b1836);
  background-size:400% 400%; animation:gradientShift 18s ease infinite;
  min-height:100vh; overflow-x:hidden;
}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
h1,h2,h3,h4{font-family:'Poppins',sans-serif;}
.bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.35;animation:float 12s ease-in-out infinite;}
.orb1{width:400px;height:400px;background:var(--accent);top:-100px;left:-100px;animation-delay:0s;}
.orb2{width:300px;height:300px;background:var(--accent2);bottom:-80px;right:-80px;animation-delay:3s;}
.orb3{width:250px;height:250px;background:var(--accent3);top:40%;left:60%;animation-delay:6s;}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}

#app{position:relative;z-index:1;min-height:100vh;}
.hidden{display:none !important;}

/* ---- Nav ---- */
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;backdrop-filter:blur(10px);position:sticky;top:0;z-index:20;background:rgba(15,12,41,0.35);border-bottom:1px solid var(--card-border);}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.3rem;}
.logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 20px rgba(124,92,255,0.5);animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.nav-right{display:flex;align-items:center;gap:18px;}
.streak-pill,.xp-pill{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--card-border);padding:7px 14px;border-radius:999px;font-weight:600;font-size:0.9rem;}
.btn{cursor:pointer;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-weight:600;transition:transform .15s ease, box-shadow .15s ease;}
.btn:active{transform:scale(0.95);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:10px 20px;box-shadow:0 4px 18px rgba(124,92,255,0.4);}
.btn-primary:hover{box-shadow:0 6px 24px rgba(124,92,255,0.6);transform:translateY(-2px);}
.btn-ghost{background:var(--card);border:1px solid var(--card-border);color:var(--text);padding:10px 18px;}
.btn-ghost:hover{background:rgba(255,255,255,0.12);}

/* ---- Auth screen ---- */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:90vh;padding:20px;}
.auth-card{background:var(--card);border:1px solid var(--card-border);backdrop-filter:blur(16px);border-radius:var(--radius);padding:40px;width:100%;max-width:400px;animation:popIn .5s cubic-bezier(.2,1.4,.4,1);}
@keyframes popIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.auth-card h1{font-size:1.8rem;margin-bottom:6px;text-align:center;}
.auth-sub{color:var(--text-dim);text-align:center;margin-bottom:26px;font-size:0.95rem;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.85rem;color:var(--text-dim);margin-bottom:6px;}
.field input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.95rem;outline:none;transition:border .15s;}
.field input:focus{border-color:var(--accent2);}
.auth-toggle{text-align:center;margin-top:16px;font-size:0.9rem;color:var(--text-dim);}
.auth-toggle a{color:var(--accent2);cursor:pointer;font-weight:600;}
.auth-error{color:var(--red);font-size:0.85rem;margin-bottom:10px;min-height:18px;}
.auth-card .btn-primary{width:100%;padding:13px;font-size:1rem;}

/* ---- Dashboard ---- */
#dashboard{padding:30px 32px 80px;max-width:1200px;margin:0 auto;}
.hero{margin-bottom:30px;}
.hero h1{font-size:2rem;margin-bottom:6px;}
.hero p{color:var(--text-dim);}
.progress-strip{display:flex;gap:16px;margin:24px 0;flex-wrap:wrap;}
.stat-card{flex:1;min-width:140px;background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:18px;text-align:center;}
.stat-card .num{font-size:1.7rem;font-weight:800;font-family:'Poppins',sans-serif;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;}
.stat-card .lbl{color:var(--text-dim);font-size:0.85rem;margin-top:4px;}

.section-title{font-size:1.3rem;margin:34px 0 16px;display:flex;align-items:center;gap:8px;}
.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
.course-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:22px;cursor:pointer;position:relative;overflow:hidden;transition:transform .25s ease, box-shadow .25s ease;animation:fadeUp .5s ease both;}
.course-card:hover{transform:translateY(-6px);box-shadow:0 14px 40px rgba(0,0,0,0.35);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.course-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:14px;box-shadow:0 6px 20px rgba(0,0,0,0.3);}
.course-card h3{font-size:1.15rem;margin-bottom:6px;}
.course-card p{color:var(--text-dim);font-size:0.88rem;line-height:1.4;margin-bottom:14px;min-height:38px;}
.course-progress-bar{height:8px;border-radius:999px;background:rgba(255,255,255,0.1);overflow:hidden;margin-bottom:6px;}
.course-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:999px;transition:width .6s cubic-bezier(.2,1,.3,1);}
.course-progress-txt{font-size:0.78rem;color:var(--text-dim);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);}

/* ---- Lesson list panel ---- */
#courseView{padding:30px 32px 80px;max-width:900px;margin:0 auto;}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);cursor:pointer;margin-bottom:18px;font-weight:600;}
.back-btn:hover{color:var(--text);}
.course-header{display:flex;gap:18px;align-items:center;margin-bottom:26px;}
.course-header .course-icon{margin-bottom:0;width:64px;height:64px;font-size:2rem;flex-shrink:0;}
.lesson-path{display:flex;flex-direction:column;gap:14px;position:relative;}
.lesson-node{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:16px 20px;cursor:pointer;transition:transform .2s ease, background .2s ease;animation:fadeUp .4s ease both;}
.lesson-node:hover{transform:translateX(6px);background:rgba(255,255,255,0.1);}
.lesson-node.locked{opacity:0.45;cursor:not-allowed;}
.lesson-node.locked:hover{transform:none;}
.lesson-bullet{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;background:rgba(255,255,255,0.08);border:2px solid var(--card-border);}
.lesson-node.done .lesson-bullet{background:linear-gradient(135deg,var(--green),#27ae60);border-color:transparent;}
.lesson-node.current .lesson-bullet{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;animation:pulse 2s infinite;}
.lesson-info h4{font-size:1.02rem;margin-bottom:3px;}
.lesson-info span{font-size:0.8rem;color:var(--text-dim);}

/* ---- Lesson player ---- */
#lessonPlayer{position:fixed;inset:0;background:linear-gradient(-45deg,var(--bg1),var(--bg2),var(--bg3));background-size:400% 400%;animation:gradientShift 18s ease infinite;z-index:100;display:flex;flex-direction:column;}
.player-top{display:flex;align-items:center;gap:16px;padding:18px 26px;}
.player-close{cursor:pointer;font-size:1.4rem;color:var(--text-dim);width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s;}
.player-close:hover{background:rgba(255,255,255,0.1);color:var(--text);}
.player-track{flex:1;height:12px;background:rgba(255,255,255,0.1);border-radius:999px;overflow:hidden;}
.player-track-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:999px;transition:width .5s cubic-bezier(.2,1,.3,1);}
.player-hearts{display:flex;gap:3px;font-size:1.1rem;}
.player-body{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.step-card{max-width:640px;width:100%;animation:stepIn .45s cubic-bezier(.2,1,.3,1);}
@keyframes stepIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.step-tag{display:inline-block;background:var(--card);border:1px solid var(--card-border);padding:5px 14px;border-radius:999px;font-size:0.75rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--accent2);margin-bottom:18px;}
.step-card h2{font-size:1.6rem;margin-bottom:16px;line-height:1.3;}
.step-card .body-text{color:var(--text-dim);font-size:1.02rem;line-height:1.7;margin-bottom:10px;}
.step-emoji{display:flex;justify-content:center;color:var(--accent2);margin:10px 0 22px;animation:bounce 2.2s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.options{display:flex;flex-direction:column;gap:12px;margin-top:20px;}
.option{background:var(--card);border:2px solid var(--card-border);border-radius:14px;padding:15px 18px;cursor:pointer;transition:all .18s ease;font-size:0.98rem;display:flex;align-items:center;gap:12px;}
.option:hover{border-color:var(--accent2);background:rgba(0,212,255,0.08);}
.option.selected{border-color:var(--accent);background:rgba(124,92,255,0.15);}
.option.correct{border-color:var(--green);background:rgba(46,204,113,0.18);animation:shakeSuccess .4s;}
.option.wrong{border-color:var(--red);background:rgba(255,92,92,0.18);animation:shakeFail .4s;}
@keyframes shakeSuccess{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes shakeFail{0%,20%,40%,60%,80%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}15%,35%,55%,75%,95%{transform:translateX(6px)}}
.option-letter{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0;}

.fill-input{width:100%;padding:14px 16px;border-radius:12px;border:2px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:1.05rem;outline:none;margin-top:16px;font-family:'Inter',sans-serif;}
.fill-input:focus{border-color:var(--accent2);}
.fill-input.correct{border-color:var(--green);background:rgba(46,204,113,0.1);}
.fill-input.wrong{border-color:var(--red);background:rgba(255,92,92,0.1);}

.code-box{margin-top:16px;background:#0d0b1e;border:1px solid var(--card-border);border-radius:14px;overflow:hidden;}
.code-box .code-head{display:flex;gap:6px;padding:10px 14px;background:rgba(255,255,255,0.04);}
.code-dot{width:10px;height:10px;border-radius:50%;}
.code-box textarea{width:100%;background:transparent;border:none;color:#c8ffcf;font-family:'SFMono-Regular',Consolas,Menlo,monospace;font-size:0.92rem;padding:16px;min-height:130px;resize:vertical;outline:none;line-height:1.5;}
.code-output{padding:12px 16px;font-family:monospace;font-size:0.85rem;border-top:1px solid var(--card-border);color:var(--text-dim);white-space:pre-wrap;}
.code-output.ok{color:var(--green);}
.code-output.err{color:var(--red);}

.feedback-banner{position:fixed;left:0;right:0;bottom:0;padding:20px 26px;display:flex;align-items:center;justify-content:space-between;gap:20px;transform:translateY(110%);transition:transform .35s cubic-bezier(.2,1,.3,1);z-index:5;}
.feedback-banner.show{transform:translateY(0);}
.feedback-banner.correct{background:rgba(46,204,113,0.18);border-top:2px solid var(--green);}
.feedback-banner.wrong{background:rgba(255,92,92,0.18);border-top:2px solid var(--red);}
.feedback-left{display:flex;align-items:center;gap:14px;}
.feedback-icon{font-size:1.8rem;}
.feedback-text h4{font-size:1.05rem;}
.feedback-text p{font-size:0.85rem;color:var(--text-dim);}
.player-nav-btn{padding:13px 30px;font-size:1rem;}

/* ---- Lesson complete ---- */
.complete-screen{text-align:center;max-width:420px;}
.complete-screen .big-emoji{font-size:5rem;animation:popIn .6s cubic-bezier(.2,1.4,.4,1);}
.complete-screen h2{font-size:1.8rem;margin:10px 0;}
.xp-gain{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent2));padding:10px 22px;border-radius:999px;font-weight:700;margin:14px 0 24px;}
.confetti{position:fixed;top:-20px;width:10px;height:10px;z-index:200;pointer-events:none;animation:confettiFall linear forwards;}
@keyframes confettiFall{to{transform:translateY(105vh) rotate(720deg);opacity:0.3;}}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card);border:1px solid var(--card-border);backdrop-filter:blur(10px);padding:12px 22px;border-radius:12px;z-index:300;transition:transform .3s ease;font-size:0.9rem;}
.toast.show{transform:translateX(-50%) translateY(0);}

.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.1);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  nav{padding:14px 16px;} #dashboard,#courseView{padding:20px 16px 60px;}
  .step-card h2{font-size:1.3rem;}
}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div id="app">

  <!-- AUTH SCREEN -->
  <div id="authScreen">
    <div class="auth-card">
      <h1>EverythingLearn</h1>
      <p class="auth-sub" id="authSubtitle">Welcome back! Log in to continue your streak.</p>
      <div class="auth-error" id="authError"></div>
      <div class="field" id="nameField" style="display:none;">
        <label>Display name</label>
        <input type="text" id="authName" placeholder="Ada Lovelace">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="authEmail" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="authPassword" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="authSubmit">Log In</button>
      <div class="auth-toggle" id="authToggle">Don't have an account? <a id="authToggleLink">Sign up</a></div>
    </div>
  </div>

  <!-- MAIN APP (nav + dashboard) -->
  <div id="mainApp" class="hidden">
    <nav>
      <div class="logo"><div class="logo-mark" id="logoMark"></div> EverythingLearn</div>
      <div class="nav-right">
        <div class="streak-pill"><span class="ic" id="streakIcon" style="width:16px;height:16px;"></span> <span id="streakCount">0</span></div>
        <div class="xp-pill"><span class="ic" id="xpIcon" style="width:16px;height:16px;"></span> <span id="xpCount">0</span> XP</div>
        <button class="btn btn-ghost" id="logoutBtn">Log out</button>
      </div>
    </nav>

    <div id="dashboard">
      <div class="hero">
        <h1 id="greeting">Hey there</h1>
        <p>Pick a course and keep the streak alive.</p>
      </div>
      <div class="progress-strip">
        <div class="stat-card"><div class="num" id="statCourses">0</div><div class="lbl">Courses started</div></div>
        <div class="stat-card"><div class="num" id="statLessons">0</div><div class="lbl">Lessons completed</div></div>
        <div class="stat-card"><div class="num" id="statXp">0</div><div class="lbl">Total XP</div></div>
        <div class="stat-card"><div class="num" id="statStreak">0</div><div class="lbl">Day streak</div></div>
      </div>
      <h2 class="section-title"><span class="ic" id="allCoursesIcon" style="width:20px;height:20px;"></span> All courses</h2>
      <div class="course-grid" id="courseGrid"><div class="spinner"></div></div>
    </div>

    <div id="courseView" class="hidden">
      <div class="back-btn" id="backToDash"><span class="ic" id="backIcon" style="width:16px;height:16px;"></span> Back to courses</div>
      <div class="course-header">
        <div class="course-icon" id="cvIcon"></div>
        <div>
          <h2 id="cvTitle">Course</h2>
          <p id="cvDesc" style="color:var(--text-dim);"></p>
        </div>
      </div>
      <div class="lesson-path" id="lessonPath"></div>
    </div>
  </div>

  <!-- LESSON PLAYER -->
  <div id="lessonPlayer" class="hidden">
    <div class="player-top">
      <div class="player-close" id="playerClose"></div>
      <div class="player-track"><div class="player-track-fill" id="playerTrackFill" style="width:0%"></div></div>
      <div class="player-hearts" id="playerHearts"></div>
    </div>
    <div class="player-body" id="playerBody"></div>
    <div class="feedback-banner" id="feedbackBanner">
      <div class="feedback-left">
        <div class="feedback-icon ic" id="feedbackIcon" style="width:28px;height:28px;"></div>
        <div class="feedback-text"><h4 id="feedbackTitle">Correct!</h4><p id="feedbackSub">Nice work.</p></div>
      </div>
      <button class="btn btn-primary player-nav-btn" id="feedbackContinue">Continue</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<!-- Firebase (compat SDK) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

$('authToggleLink').addEventListener('click', ()=>{
  isSignupMode = !isSignupMode;
  $('nameField').style.display = isSignupMode ? 'block' : 'none';
  $('authSubmit').textContent = isSignupMode ? 'Sign Up' : 'Log In';
  $('authSubtitle').textContent = isSignupMode ? 'Create your account and start learning.' : 'Welcome back! Log in to continue your streak.';
  $('authToggle').innerHTML = isSignupMode
    ? `Already have an account? <a id="authToggleLink2">Log in</a>`
    : `Don't have an account? <a id="authToggleLink2">Sign up</a>`;
  document.getElementById('authToggleLink2').addEventListener('click', ()=>$('authToggleLink').click());
  $('authError').textContent='';

$('authSubmit').addEventListener('click', async ()=>{
  const email = $('authEmail').value.trim();
  const pass = $('authPassword').value;
  const name = $('authName').value.trim();
  $('authError').textContent = '';
  if(!email || !pass){ $('authError').textContent = 'Please fill in email and password.'; return; }
  $('authSubmit').textContent = 'Please wait...';
  try{
    if(isSignupMode){
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({displayName: name || email.split('@')[0]});
      await db.collection('users').doc(cred.user.uid).set({
        displayName: name || email.split('@')[0], xp:0, streak:0, lastActive: firebase.firestore.FieldValue.serverTimestamp(), createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      await auth.signInWithEmailAndPassword(email, pass);
    }
  }catch(err){
    $('authError').textContent = friendlyAuthError(err);
  }
  $('authSubmit').textContent = isSignupMode ? 'Sign Up' : 'Log In';
});

function friendlyAuthError(err){
  const map = {
    'auth/email-already-in-use':'That email is already registered.',
    'auth/invalid-email':'That email looks invalid.',
    'auth/weak-password':'Password should be at least 6 characters.',
    'auth/user-not-found':'No account with that email.',
    'auth/wrong-password':'Incorrect password.',
    'auth/invalid-credential':'Incorrect email or password.',
  };
  return map[err.code] || err.message;
}

auth.onAuthStateChanged(async (user)=>{
  currentUser = user;

    $('authScreen').classList.add('hidden');

    await loadUserDoc();
    await bumpStreak();

  } else {

    $('authScreen').classList.remove('hidden');
  }
});

async function loadUserDoc(){
  const ref = db.collection('users').doc(currentUser.uid);
  const snap = await ref.get();
  if(snap.exists){ userDocData = snap.data(); }
  else{
    userDocData = { displayName: currentUser.displayName || currentUser.email.split('@')[0], xp:0, streak:0, lastActive:null };
    await ref.set(userDocData);
  }
  $('greeting').textContent = `Hey, ${userDocData.displayName || 'there'}`;
}

async function bumpStreak(){
  const ref = db.collection('users').doc(currentUser.uid);
  const today = new Date(); today.setHours(0,0,0,0);
  let last = userDocData.lastActive && userDocData.lastActive.toDate ? userDocData.lastActive.toDate() : null;
  let newStreak = userDocData.streak || 0;
  if(last){
    last.setHours(0,0,0,0);
    const diffDays = Math.round((today - last)/86400000);
    if(diffDays === 1) newStreak += 1;
    else if(diffDays > 1) newStreak = 1;
    // diffDays === 0 -> same day, keep streak
  } else {
    newStreak = 1;
  }
  userDocData.streak = newStreak;
  userDocData.lastActive = firebase.firestore.Timestamp.now();
  await ref.update({streak:newStreak, lastActive: firebase.firestore.FieldValue.serverTimestamp()});
  $('streakCount').textContent = newStreak;
}

    return await db.collection('courses').get();
  });
  coursesCache = snap.docs.map(d=>({id:d.id, ...d.data()}));
}

async function loadAllProgress(){
  const snap = await db.collection('users').doc(currentUser.uid).collection('progress').get();
  progressCache = {};

}

/* ---------------- DASHBOARD ---------------- */
function renderDashboard(){
  $('xpCount').textContent = userDocData.xp || 0;
  $('streakCount').textContent = userDocData.streak || 0;
  $('statXp').textContent = userDocData.xp || 0;
  $('statStreak').textContent = userDocData.streak || 0;
  $('statCourses').textContent = Object.keys(progressCache).length;
  let totalLessonsDone = 0;
  Object.values(progressCache).forEach(p => totalLessonsDone += (p.completedLessons||[]).length);
  $('statLessons').textContent = totalLessonsDone;

  const grid = $('courseGrid');
  if(coursesCache.length === 0){
    grid.innerHTML = `<div class="empty-state">No courses yet. Head to admin.html to add your first course.</div>`;
    return;
  }
  grid.innerHTML = '';
  coursesCache.forEach((c, i)=>{
    const prog = progressCache[c.id];
    const doneCount = prog ? (prog.completedLessons||[]).length : 0;
    const total = c.lessonCount || 0;
    const pct = total>0 ? Math.round((doneCount/total)*100) : 0;
    const card = document.createElement('div');
    card.className='course-card';
    card.style.animationDelay = (i*0.06)+'s';
    card.innerHTML = `
      <div class="course-icon" style="background:${c.color||'linear-gradient(135deg,#7c5cff,#00d4ff)'}">${renderCourseIcon(c.icon, 26)}</div>
      <h3>${escapeHtml(c.title||'Untitled')}</h3>
      <p>${escapeHtml(c.description||'')}</p>
      <div class="course-progress-bar"><div class="course-progress-fill" style="width:${pct}%"></div></div>
      <div class="course-progress-txt">${doneCount}/${total||'?'} lessons · ${pct}%</div>
    `;
    card.addEventListener('click', ()=> openCourse(c));
    grid.appendChild(card);
  });
}

function escapeHtml(str){
  const d = document.createElement('div'); d.textContent = str||''; return d.innerHTML;
}
function renderCourseIcon(key, size){
  size = size || 24;
  if(key && ICONS[key]) return `<span class="ic" style="width:${size}px;height:${size}px;">${ICONS[key]}</span>`;
  return `<span class="ic" style="width:${size}px;height:${size}px;">${ICONS.book}</span>`;
}

/* ---------------- COURSE VIEW ---------------- */
async function openCourse(course){
  activeCourse = course;
  $('dashboard').classList.add('hidden');
  $('courseView').classList.remove('hidden');
  $('cvIcon').innerHTML = renderCourseIcon(course.icon, 30);
  $('cvIcon').style.background = course.color||'linear-gradient(135deg,#7c5cff,#00d4ff)';
  $('cvTitle').textContent = course.title;
  $('cvDesc').textContent = course.description||'';
  $('lessonPath').innerHTML = '<div class="spinner"></div>';

  const snap = await db.collection('courses').doc(course.id).collection('lessons').orderBy('order','asc').get();
  activeLessons = snap.docs.map(d=>({id:d.id, ...d.data()}));
  renderLessonPath();
}

function renderLessonPath(){
  const prog = progressCache[activeCourse.id] || {completedLessons:[]};
  const done = prog.completedLessons || [];
  const path = $('lessonPath');
  if(activeLessons.length === 0){
    path.innerHTML = `<div class="empty-state">No lessons in this course yet.</div>`;
    return;
  }
  path.innerHTML = '';
  activeLessons.forEach((lesson, i)=>{
    const isDone = done.includes(lesson.id);
    const isCurrent = !isDone && (i===0 || done.includes(activeLessons[i-1].id));
    const isLocked = !isDone && !isCurrent;
    const node = document.createElement('div');
    node.className = `lesson-node ${isDone?'done':''} ${isCurrent?'current':''} ${isLocked?'locked':''}`;
    node.style.animationDelay = (i*0.05)+'s';
    node.innerHTML = `
      <div class="lesson-bullet">${isDone?icon('check',16):(isLocked?icon('lock',15):(i+1))}</div>
      <div class="lesson-info">
        <h4>${escapeHtml(lesson.title)}</h4>
        <span>${(lesson.steps||[]).length} steps ${isDone?'· Completed':''}</span>
      </div>
    `;
    if(!isLocked){
      node.addEventListener('click', ()=> startLesson(lesson));
    }
    path.appendChild(node);
  });
}

let savedScrollY = 0;
function lockBodyScroll(){
  savedScrollY = window.scrollY || window.pageYOffset || 0;
  document.body.style.position = 'fixed';
  document.body.style.top = `-${savedScrollY}px`;
  document.body.style.left = '0';
  document.body.style.right = '0';
  document.body.style.width = '100%';
  document.documentElement.classList.add('locked');
}
function unlockBodyScroll(){
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.left = '';
  document.body.style.right = '';
  document.body.style.width = '';
  document.documentElement.classList.remove('locked');
  window.scrollTo(0, savedScrollY);
}

function startLesson(lesson){
  activeLesson = lesson;
  activeSteps = lesson.steps || [];
  stepIndex = 0;
  hearts = 3;
  lessonXpEarned = 0;
  $('lessonPlayer').classList.remove('hidden');
  lockBodyScroll();
  updateHearts();
  renderStep();
}

$('playerClose').addEventListener('click', ()=>{
  $('lessonPlayer').classList.add('hidden');
  unlockBodyScroll();
  hideFeedback();
});

function updateHearts(){
  let html = '';
  for(let i=0;i<3;i++){
    html += `<span class="ic" style="width:18px;height:18px;color:${i<hearts?'var(--red)':'rgba(255,255,255,0.25)'}">${i<hearts?ICONS.heart:ICONS.heartOutline}</span>`;
  }
  $('playerHearts').innerHTML = html;
}

function updateTrack(){
  const pct = Math.round((stepIndex/activeSteps.length)*100);
  $('playerTrackFill').style.width = pct+'%';
}

function renderStep(){
  try{
    renderStepInner();
  }catch(err){
    console.error('Step render failed:', err);
    $('playerBody').innerHTML = `
      <div class="step-card">
        <span class="step-tag">Something went wrong</span>
        <h2>This step couldn't load</h2>
        <p class="body-text">There was a problem showing this exercise. You can skip it and keep going.</p>
        <button class="btn btn-primary player-nav-btn" style="margin-top:20px;" id="skipBrokenStep">Skip this step</button>
      </div>`;
    $('skipBrokenStep').addEventListener('click', nextStep);
  }
}

function renderStepInner(){
  hideFeedback();
  updateTrack();
  const body = $('playerBody');
  if(stepIndex >= activeSteps.length){
    renderComplete();
    return;
  }
  const step = activeSteps[stepIndex];
  const type = step.type || 'content';
  let html = '';
  if(type === 'content'){
    html = `
      <div class="step-card">
        <span class="step-tag">Lesson</span>
        ${step.emoji ? `<div class="step-emoji">${renderCourseIcon(step.emoji, 56)}</div>` : ''}
        <h2>${escapeHtml(step.title||'')}</h2>
        <p class="body-text">${escapeHtml(step.body||'')}</p>
      </div>`;
    body.innerHTML = html;
    body.querySelectorAll('.step-card').forEach(c=>{
      const btn = document.createElement('button');
      btn.className='btn btn-primary player-nav-btn';
      btn.style.marginTop='24px';
      btn.textContent='Continue';
      btn.addEventListener('click', nextStep);
      c.appendChild(btn);
    });
  } else if(type === 'mcq'){
    const opts = step.options || [];
    if(opts.length < 2) throw new Error('MCQ step has fewer than 2 options');
    html = `
      <div class="step-card">
        <span class="step-tag">Quick Check</span>
        <h2>${escapeHtml(step.question||'')}</h2>
        <div class="options" id="mcqOptions"></div>
      </div>`;
    body.innerHTML = html;
    const optsWrap = $('mcqOptions');
    const letters = ['A','B','C','D','E','F'];
    opts.forEach((opt, i)=>{
      const el = document.createElement('div');
      el.className='option';
      el.innerHTML = `<div class="option-letter">${letters[i]}</div><div>${escapeHtml(opt)}</div>`;
      el.addEventListener('click', ()=> answerMcq(i, step, el, optsWrap));
      optsWrap.appendChild(el);
    });
  } else if(type === 'fillblank'){
    html = `
      <div class="step-card">
        <span class="step-tag">Fill in the blank</span>
        <h2>${escapeHtml(step.question||'')}</h2>
        <input type="text" class="fill-input" id="fillInput" placeholder="Type your answer...">
        <button class="btn btn-primary player-nav-btn" style="margin-top:18px;" id="fillSubmit">Check</button>
      </div>`;
    body.innerHTML = html;
    $('fillSubmit').addEventListener('click', ()=> answerFill(step));
    $('fillInput').addEventListener('keydown', e=>{ if(e.key==='Enter') answerFill(step); });
  } else if(type === 'code'){
    html = `
      <div class="step-card">
        <span class="step-tag">Code Challenge</span>
        <h2>${escapeHtml(step.prompt||'')}</h2>
        <div class="code-box">
          <div class="code-head"><div class="code-dot" style="background:#ff5f56"></div><div class="code-dot" style="background:#ffbd2e"></div><div class="code-dot" style="background:#27c93f"></div></div>
          <textarea id="codeInput" spellcheck="false">${escapeHtml(step.starterCode||'// write your code here\n')}</textarea>
          <div class="code-output" id="codeOutput" style="display:none;"></div>
        </div>
        <button class="btn btn-primary player-nav-btn" style="margin-top:18px;" id="runCode">Run Code</button>
      </div>`;
    body.innerHTML = html;
    $('runCode').addEventListener('click', ()=> runCodeStep(step));
  }
}

function answerMcq(i, step, el, wrap){
  if(wrap.dataset.answered) return;
  wrap.dataset.answered = '1';
  const correctIdx = step.correctIndex;
  wrap.querySelectorAll('.option').forEach((o,idx)=>{
    if(idx===correctIdx) o.classList.add('correct');
    else if(idx===i) o.classList.add('wrong');
  });
  const isCorrect = i === correctIdx;
  showFeedback(isCorrect, step.explanation);
}

function answerFill(step){
  const input = $('fillInput');
  const val = input.value.trim().toLowerCase();
  const accepted = (step.answers||[step.answer||'']).map(a=>String(a).trim().toLowerCase());
  const isCorrect = accepted.includes(val);
  input.classList.add(isCorrect?'correct':'wrong');
  input.disabled = true;
  showFeedback(isCorrect, step.explanation || (isCorrect? '' : `Correct answer: ${step.answers?step.answers[0]:step.answer}`));
}

let codeRunLogs = [];
let codeRunTimeout = null;
let codeRunStep = null;

function runCodeStep(step){
  const code = $('codeInput').value;
  const out = $('codeOutput');
  out.style.display='block';
  out.textContent = 'Running...';
  out.className = 'code-output';
  codeRunLogs = [];
  codeRunStep = step;

  // fresh sandboxed iframe every run so state never leaks between runs
  const oldFrame = document.getElementById('codeSandboxFrame');
  if(oldFrame) oldFrame.remove();
  const iframe = document.createElement('iframe');
  iframe.id = 'codeSandboxFrame';
  iframe.sandbox = 'allow-scripts'; // no allow-same-origin -> isolated origin, can't touch parent DOM
  iframe.style.display = 'none';
  document.body.appendChild(iframe);

  const escapedCode = code.replace(/<\/script/gi, '<\\/script');
  const sandboxHtml = `<!DOCTYPE html><html><body><script>
    window.console = {
      log: function(){ var a=Array.prototype.slice.call(arguments).map(function(x){return (typeof x==='object')?JSON.stringify(x):String(x);}).join(' '); parent.postMessage({__codesandbox:true,type:'log',payload:a}, '*'); },
      error: function(){ var a=Array.prototype.slice.call(arguments).join(' '); parent.postMessage({__codesandbox:true,type:'log',payload:'Error: '+a}, '*'); },
      warn: function(){ var a=Array.prototype.slice.call(arguments).join(' '); parent.postMessage({__codesandbox:true,type:'log',payload:a}, '*'); }
    };
    // document.write and navigation are neutralized inside this isolated sandbox origin
    document.write = function(){ parent.postMessage({__codesandbox:true,type:'log',payload:'(document.write is disabled in this sandbox)'}, '*'); };
    window.alert = function(msg){ parent.postMessage({__codesandbox:true,type:'log',payload:'alert: '+msg}, '*'); };
    try {
      ${escapedCode}
      parent.postMessage({__codesandbox:true,type:'done'}, '*');
    } catch(e) {
      parent.postMessage({__codesandbox:true,type:'error',payload:e.message}, '*');
    }
  <\/script></body></html>`;
  iframe.srcdoc = sandboxHtml;

  clearTimeout(codeRunTimeout);
  codeRunTimeout = setTimeout(()=>{
    finishCodeRun(step, false, 'Timed out — check for infinite loops.');
  }, 3000);
}

window.addEventListener('message', (e)=>{
  const msg = e.data;
  if(!msg || !msg.__codesandbox) return;
  const iframe = document.getElementById('codeSandboxFrame');
  if(!iframe || e.source !== iframe.contentWindow) return;
  if(msg.type === 'log') codeRunLogs.push(msg.payload);
  else if(msg.type === 'done'){ clearTimeout(codeRunTimeout); finishCodeRun(codeRunStep, true); }
  else if(msg.type === 'error'){ clearTimeout(codeRunTimeout); finishCodeRun(codeRunStep, false, 'Error: ' + msg.payload); }
});

function finishCodeRun(step, success, errMsg){
  const out = $('codeOutput');
  if(!success){
    out.textContent = errMsg || 'Error running code.';
    out.className = 'code-output err';
    showFeedback(false, 'Fix the error and try again.');
    return;
  }
  const output = codeRunLogs.join('\n');
  const expected = (step.expectedOutput||'').trim();
  const isCorrect = expected ? output.trim() === expected : true;
  out.textContent = output || '(no output)';
  out.className = 'code-output ' + (isCorrect?'ok':'err');
  showFeedback(isCorrect, isCorrect ? 'Your code ran successfully.' : `Expected output:\n${expected}`);
}

function showFeedback(isCorrect, sub){
  const banner = $('feedbackBanner');
  banner.className = 'feedback-banner show ' + (isCorrect?'correct':'wrong');
  $('feedbackIcon').style.color = isCorrect ? 'var(--green)' : 'var(--red)';
  $('feedbackIcon').innerHTML = isCorrect ? ICONS.check : ICONS.cross;
  $('feedbackTitle').textContent = isCorrect ? 'Correct!' : 'Not quite';
  $('feedbackSub').textContent = sub || (isCorrect? 'Great job, keep going.' : 'Review and try the next one.');
  if(isCorrect){ lessonXpEarned += 10; }
  else{
    hearts = Math.max(0, hearts-1);
    updateHearts();
  }
}
function hideFeedback(){
  $('feedbackBanner').className = 'feedback-banner';
}
$('feedbackContinue').addEventListener('click', nextStep);

function nextStep(){
  hideFeedback();
  stepIndex++;
  renderStep();
}

function renderComplete(){
  updateTrack();
  $('playerBody').innerHTML = `
    <div class="step-card complete-screen">
      <div class="big-emoji" style="display:flex;justify-content:center;color:var(--yellow);">${icon('trophy',64)}</div>
      <h2>Lesson complete!</h2>
      <div class="xp-gain">+${lessonXpEarned || 10} XP</div>
      <br>
      <button class="btn btn-primary player-nav-btn" id="finishLessonBtn">Awesome, continue</button>
    </div>`;
  launchConfetti();
  $('finishLessonBtn').addEventListener('click', finishLesson);
}

function launchConfetti(){
  const colors = ['#7c5cff','#00d4ff','#ff5c8a','#ffcf4d','#2ecc71'];
  for(let i=0;i<60;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.left = Math.random()*100+'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (2+Math.random()*2)+'s';
    c.style.borderRadius = Math.random()>0.5 ? '50%':'2px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 4200);
  }
}

async function finishLesson(){
  const xpGain = lessonXpEarned || 10;
  const courseId = activeCourse.id;
  const ref = db.collection('users').doc(currentUser.uid).collection('progress').doc(courseId);
  const existing = progressCache[courseId] || {completedLessons:[], xp:0};
  const completed = new Set(existing.completedLessons||[]);
  completed.add(activeLesson.id);
  const newProg = { completedLessons: Array.from(completed), xp: (existing.xp||0) + xpGain, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  await ref.set(newProg, {merge:true});
  progressCache[courseId] = newProg;

  userDocData.xp = (userDocData.xp||0) + xpGain;
  await db.collection('users').doc(currentUser.uid).update({xp: userDocData.xp});

  $('lessonPlayer').classList.add('hidden');
  unlockBodyScroll();
  showToast(`+${xpGain} XP earned!`);
  renderLessonPath();
  renderDashboard();
}
</script>
</body>
</html>
